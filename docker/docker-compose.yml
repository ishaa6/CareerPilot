name: careerpilot

services:
  backend:
    build:
      context: ../backend

    container_name: careerpilot-backend

    ports:
      - "8000:8000"

    volumes:
      - ../backend:/app

    command: >
      bash -c "
      python -m app.db.initialize &&
      uvicorn app.app:app
      --host 0.0.0.0
      --port 8000
      --reload
      "

    depends_on:
      - postgres
      - qdrant

    env_file:
      - ../backend/.env

    environment:
      DATABASE_URL: postgresql://shreyaa:6612@postgres:5432/careerpilot
      QDRANT_URL: http://qdrant:6333

  postgres:
    image: postgres:16

    container_name: careerpilot-postgres

    environment:
      POSTGRES_USER: shreyaa
      POSTGRES_PASSWORD: 6612
      POSTGRES_DB: careerpilot

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant

    container_name: careerpilot-qdrant

    ports:
      - "6333:6333"

    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data: